<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支持作者 - 极简书签同步</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .heart {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 16px;
            color: #333;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .qr-code {
            display: inline-block;
        }
        .qr-code img {
            width: 240px;
            height: 240px;
            border-radius: 8px;
        }
        .qr-label {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        .divider {
            height: 1px;
            background: #eee;
            margin: 30px 0;
        }
        .bmac-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #FFDD00;
            color: #000;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .bmac-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 221, 0, 0.4);
        }
        .bmac-btn img {
            width: 20px;
            height: 20px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">💖</div>
        <h1>支持作者</h1>
        <p class="subtitle">如果你觉得「极简书签同步」对你有帮助<br>欢迎请作者喝杯咖啡 ☕</p>

        <div class="section">
            <div class="section-title">
                <span>🍵</span>
                <span>微信赞赏</span>
            </div>
            <div class="qr-code">
                <img src="images/wechat.png" alt="微信赞赏码" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="qr-label" style="display:none;">请上传微信赞赏码图片</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section">
            <div class="section-title">
                <span>☕</span>
                <span>Buy Me a Coffee</span>
            </div>
            <a class="bmac-btn" onclick="event.preventDefault()">
                <img src="https://cdn.buymeacoffee.com/buttons/bmc-new-btn-logo.svg" alt="Buy Me a Coffee">
                请我喝咖啡
            </a>
        </div>

        <div class="footer">
            <a href="https://github.com/jagshen/Mini-bookmark-sync">极简书签同步</a> · 让书签同步变得简单
        </div>
    </div>
</body>
</html>
