<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>极简书签同步</title>
    <style>
        * { box-sizing: border-box; }
        body {
            width: 320px;
            margin: 0;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            color: #222;
            background: #fff;
        }

        /* ===== 主页视图 ===== */
        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px 14px 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            letter-spacing: 2px;
            color: #6b7280;
            font-weight: 700;
        }
        .badge-ok {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #10b981;
            font-size: 12px;
            letter-spacing: 0;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .badge-ok:hover { background: #f3f4f6; }
        .badge-ok.err { color: #ef4444; }
        .badge-ok.warn { color: #f59e0b; }
        .badge-ok.off { color: #9ca3af; }
        .badge-ok.disabled { cursor: not-allowed; opacity: 0.6; }
        .badge-ok.disabled:hover { background: transparent; }

        /* ===== 右上角自动同步开关 ===== */
        .auto-switch {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 4px 2px 6px;
            border-radius: 999px;
            cursor: pointer;
            user-select: none;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0;
            line-height: 1;
            transition: background 0.15s;
        }
        .auto-switch:hover { background: #f3f4f6; }
        .auto-switch .switch-label {
            line-height: 1;
            color: #10b981;
        }
        /* 文字为空时彻底不占位（否则 flex gap 会留白） */
        .auto-switch .switch-label:empty { display: none; }
        .auto-switch .switch-track {
            position: relative;
            width: 26px;
            height: 14px;
            background: #10b981;
            border-radius: 999px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .auto-switch .switch-thumb {
            position: absolute;
            top: 1px;
            left: 13px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.25);
            transition: left 0.2s;
        }
        .auto-switch.off .switch-label { color: #9ca3af; }
        .auto-switch.off .switch-track { background: #d1d5db; }
        .auto-switch.off .switch-thumb { left: 1px; }
        .auto-switch.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        .auto-switch.disabled:hover { background: transparent; }
        .domain-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .folder-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }
        .domain-title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }
        .sub-info {
            color: #6b7280;
            font-size: 12px;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .info-box {
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            color: #2563eb;
            font-size: 12px;
            background: #f8fbff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .last-sync-label { flex-shrink: 0; }
        .last-sync-value { text-align: right; }
        .info-box.never { color: #6b7280; border-color: #e5e7eb; background: #f9fafb; }
        .info-box.warn { color: #b45309; border-color: #fcd34d; background: #fffbeb; }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 8px;
        }
        .btn {
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 6px;
            padding: 7px 10px;
            cursor: pointer;
            font-size: 13px;
            color: #374151;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:hover { background: #f9fafb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .icon-btn {
            width: 36px;
            height: 32px;
            padding: 0;
            justify-content: center;
        }
        .right-group { display: flex; gap: 6px; }

        .status-bar {
            margin-top: 10px;
            font-size: 12px;
            color: #6b7280;
            min-height: 16px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status-bar.err .status-text { color: #ef4444; }
        .status-bar.ok .status-text { color: #10b981; }
        .status-text {
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }
        .auto-sync-tag {
            color: #2563eb;
            font-size: 11px;
            white-space: nowrap;
            font-weight: 500;
        }
        .auto-sync-tag.off { color: #9ca3af; }

        /* 状态栏下方的进度行（仅在有条数时显示） */
        .progress-line {
            margin-top: 2px;
            font-size: 12px;
            color: #6b7280;
            line-height: 1.4;
            padding-left: 28px; /* 与状态文字对齐 */
        }

        /* 支持按钮 */
        .sponsor-wrap {
            position: relative;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }
        .sponsor-icon {
            width: 20px;
            height: 20px;
            opacity: 1;
            transition: opacity 0.15s, filter 0.15s;
            vertical-align: middle;
        }
        .sponsor-wrap:hover .sponsor-icon { content: url('images/nb-filled.svg'); filter: drop-shadow(0 1px 2px rgba(245,158,11,0.3)); cursor: pointer; }

        /* 卡片内码展示区 - 由 JS 控制显示 */
        .sponsor-area {
            display: none;
            text-align: center;
            margin: 10px -14px -12px;
            padding: 16px;
            overflow: hidden;
        }
        .sponsor-area.show { display: block; }
        .sponsor-text {
            font-size: 14px;
            color: #f59e0b;
            font-weight: 500;
            line-height: 1.6;
        }


        /* 底部添加配置按钮 */
        .footer-row {
            margin-top: 12px;
        }
        .add-config-btn {
            width: 100%;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .add-config-btn:hover { background: #1d4ed8; }

        /* 空态：未配置时的标题区 */
        .empty-hero {
            text-align: center;
            padding: 18px 8px 14px;
        }
        .empty-title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            letter-spacing: 1px;
        }
        .empty-sub {
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        /* ===== 配置视图 ===== */
        .hide { display: none !important; }
        .config-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .config-head h3 {
            margin: 0;
            font-size: 16px;
            flex: 1;
        }
        label {
            display: block;
            font-size: 12px;
            color: #374151;
            margin-top: 8px;
            margin-bottom: 3px;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, select:focus { border-color: #2563eb; }
        .security-hint {
            margin-top: 3px;
            padding: 5px 7px;
            background: #fffbeb;
            border: 1px solid #fcd34d;
            border-radius: 4px;
            color: #b45309;
            font-size: 11px;
            line-height: 1.3;
        }
        .field-hint {
            margin-top: 2px;
            padding: 3px 2px;
            color: #9ca3af;
            font-size: 11px;
            line-height: 1.3;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.2s ease, opacity 0.2s ease;
        }
        .field-hint.show {
            max-height: 40px;
            opacity: 1;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .row input[type="checkbox"] { width: auto; margin: 0; }
        hr { border: none; border-top: 1px solid #eee; margin: 10px 0 2px; }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .btn-row .btn { flex: 1; justify-content: center; }
        .icon-danger {
            border: 1px solid #fecaca;
            background: #fff;
            color: #ef4444;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            padding: 0;
            cursor: pointer;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .icon-danger:hover { background: #fef2f2; }
        /* 删除配置（强危险）按钮：实红底、白字，明显区别于"清空表单" */
        .icon-danger-strong {
            border: 1px solid #dc2626;
            background: #ef4444;
            color: #fff;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            padding: 0;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .icon-danger-strong:hover { background: #dc2626; }

        /* ===== 密码显示/隐藏 ===== */
        .password-wrap {
            position: relative;
        }
        .password-wrap input {
            padding-right: 36px; /* 为眼睛按钮留位 */
        }
        .password-toggle {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            color: #6b7280;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            line-height: 1;
        }
        .password-toggle:hover { background: #f3f4f6; color: #111827; }
        .password-toggle:focus { outline: none; background: #f3f4f6; }

        /* ===== 未保存状态提示 ===== */

        /* 修改过但未保存的字段：左侧橙色竖条 */
        input.dirty-field,
        select.dirty-field {
            border-left: 3px solid #f59e0b;
            background: #fffdf6;
        }
        /* checkbox 与其 label 一起高亮 */
        .row.dirty-field {
            background: #fffdf6;
            border-radius: 4px;
            padding: 2px 4px;
            margin-left: -4px;
        }

        /* 保存按钮：脏态时强调 */
        .btn-primary.dirty {
            box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45);
            animation: save-pulse 1.8s ease-out infinite;
            position: relative;
        }
        .btn-primary.dirty::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 8px;
            width: 6px;
            height: 6px;
            background: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(251, 191, 36, 0.8);
        }
        @keyframes save-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45); }
            70%  { box-shadow: 0 0 0 5px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        /* ===== 自定义确认模态框 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            width: 280px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
            padding: 18px 18px 14px;
            transform: translateY(6px) scale(0.98);
            transition: transform 0.18s ease;
        }
        .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }
        .modal-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fee2e2;
            color: #dc2626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto 10px;
        }
        .modal-title {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 8px;
        }
        .modal-body {
            font-size: 12px;
            color: #4b5563;
            line-height: 1.55;
            text-align: center;
            margin-bottom: 14px;
        }
        .modal-body .note {
            display: block;
            margin-top: 6px;
            color: #9ca3af;
            font-size: 11px;
        }
        .modal-body .note-inline {
            color: #9ca3af;
            font-size: 11px;
            margin-left: 4px;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
        }
        .modal-btn {
            flex: 1;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.15s, border-color 0.15s;
        }
        .modal-btn-cancel {
            background: #fff;
            color: #374151;
            border-color: #d1d5db;
        }
        .modal-btn-cancel:hover { background: #f9fafb; }
        .modal-btn-danger {
            background: #ef4444;
            color: #fff;
            border-color: #dc2626;
        }
        .modal-btn-danger:hover { background: #dc2626; }
    </style>
</head>
<body>
    <!-- ===== 主页视图 ===== -->
    <div id="homeView">
        <!-- 未配置态才展示：居中的空态提示 -->
        <div id="emptyHero" class="empty-hero hide">
            <div class="empty-title">极简同步，书签随身带</div>
            <div class="empty-sub">简单好用的书签同步工具，体积小巧、干净无广告。</div>
        </div>

        <div id="homeCard" class="card">
            <div class="card-head">
                <span>极简书签同步｜支持Berry</span>
                <span id="connBadge" class="auto-switch off" title="点击切换自动同步" role="switch" aria-checked="false">
                    <span class="switch-label"></span>
                    <span class="switch-track"><span class="switch-thumb"></span></span>
                </span>
            </div>

            <div class="domain-row">
                <img class="folder-icon" src="icons/icon.png" alt="">
                <span id="domainText" class="domain-title">未配置</span>
            </div>
            <div id="subInfo" class="sub-info">点击下方「添加配置」开始使用</div>

            <div id="lastSyncBox" class="info-box never">
                <span class="last-sync-label">上次同步：</span>
                <span id="lastSyncTime" class="last-sync-value">从未</span>
            </div>

            <div class="action-row">
                <button id="openConfigBtn" class="btn" title="设置">⚙️ 设置</button>
                <div class="right-group">
                    <button id="downloadBtn" class="btn icon-btn" title="从云端下载">⬇</button>
                    <button id="uploadBtn" class="btn icon-btn" title="上传到云端">⬆</button>
                    <button id="syncBtn" class="btn icon-btn btn-primary" title="两端合并同步">⟳</button>
                </div>
            </div>

            <div class="status-bar">
                <div id="sponsorBtn" class="sponsor-wrap" title="">
                    <img class="sponsor-icon" src="images/nb.svg" alt="支持">
                </div>
                <span id="status" class="status-text">就绪</span>
                <span id="autoSyncTag" class="auto-sync-tag off">未启用自动同步(右上角启用)</span>
            </div>

            <div id="progressLine" class="progress-line hide">进度：—</div>

            <div id="sponsorArea" class="sponsor-area">
                <div id="sponsorText" class="sponsor-text">💖 喜欢这个工具？支持我继续改进<br><a href="https://jagshen.github.io/Mini-bookmark-sync/support.html" target="_blank" style="color:#f59e0b;text-decoration:underline;">请我喝咖啡 →</a></div>
            </div>
        </div>

        <div id="footerRow" class="footer-row hide">
            <button id="addConfigBtn" class="add-config-btn">+ 添加配置</button>
        </div>
    </div>

    <!-- ===== 配置视图 ===== -->
    <div id="configView" class="hide">
        <div class="config-head">
            <button id="backBtn" class="btn" title="返回">←</button>
            <h3>极简配置</h3>
            <button id="deleteConfigBtn" class="icon-danger-strong" title="删除配置，谨慎操作">✕</button>
            <button id="clearConfigBtn" class="icon-danger" title="仅清空表单">🗑</button>
        </div>

        <label>WebDAV 地址:</label>
        <input type="text" id="webdav_url" placeholder="https://example.com/dav/">
        <label>用户名:</label>
        <input type="text" id="webdav_user">
        <label>应用密码:</label>
        <div class="password-wrap">
            <input type="password" id="webdav_password">
            <button type="button" id="togglePasswordBtn" class="password-toggle" title="显示密码" aria-label="显示密码" aria-pressed="false">👁</button>
        </div>
        <div class="security-hint">⚠️ 密码仅存储在本地浏览器，不会上传至第三方服务器</div>
        <label>云端文件路径 <span style="color:#f59e0b;font-weight:400;font-size:11px;">（多端同步需保持路径一致）</span>:</label>
        <input type="text" id="webdav_path" placeholder="/minibookmark">
        <div class="field-hint" id="pathHint">输入文件夹路径即可，如 /minibookmark；不指定文件名则默认 bookmarks.json</div>

        <hr>

        <div class="row" id="syncEnabledRow">
            <input type="checkbox" id="syncEnabled">
            <label for="syncEnabled" style="margin:0;">启用自动同步</label>
        </div>

        <div id="syncOptions" class="hide">
            <label>同步类型:</label>
            <select id="syncTypeSelect">
                <option value="merge" selected>合并书签（两端合并）</option>
                <option value="upload">上传书签（本地覆盖云端）</option>
                <option value="download">下载书签（云端覆盖本地）</option>
            </select>

            <label>自动同步间隔（分钟）:</label>
            <select id="intervalSelect">
                <option value="15">15 分钟</option>
                <option value="30" selected>30 分钟</option>
                <option value="60">1 小时</option>
                <option value="120">2 小时</option>
            </select>
        </div>

        <div class="btn-row">
            <button id="testConnectionBtn" class="btn">测试连接</button>
            <button id="saveBtn" class="btn btn-primary">保存</button>
        </div>

        <div id="configStatus" class="status-bar"></div>
    </div>

    <!-- ===== 通用确认模态框 ===== -->
    <div id="confirmModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-hidden="true">
        <div class="modal-box">
            <div id="confirmIcon" class="modal-icon">!</div>
            <div id="confirmTitle" class="modal-title">确认操作</div>
            <div id="confirmBody" class="modal-body"></div>
            <div class="modal-actions">
                <button id="confirmCancelBtn" class="modal-btn modal-btn-cancel" type="button">取消</button>
                <button id="confirmOkBtn" class="modal-btn modal-btn-danger" type="button">确定</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
