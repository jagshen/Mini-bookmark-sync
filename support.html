<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支持作者 - 极简书签同步</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .heart {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 16px;
            color: #333;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .qr-code {
            display: inline-block;
        }
        .qr-code img {
            width: 240px;
            height: 240px;
            border-radius: 8px;
        }
        .qr-label {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        .divider {
            height: 1px;
            background: #eee;
            margin: 30px 0;
        }
        .bmac-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #FFDD00;
            color: #000;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .bmac-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 221, 0, 0.4);
        }
        .bmac-btn img {
            width: 20px;
            height: 20px;
        }
        .bmac-btn.copied {
            background: #FFE44D;
            box-shadow: 0 0 16px rgba(255, 221, 0, 0.6);
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 999;
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.68,-0.55,0.265,1.55), opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">💖</div>
        <h1>支持作者</h1>
        <p class="subtitle">如果你觉得<a href="https://www.crxsoso.com/webstore/detail/icpmmfgcjaihgfempcebgnhnadbgofpi" style="text-decoration:none;color:#667eea;">「极简书签同步」</a>对你有帮助<br>欢迎请作者喝杯咖啡 ☕</p>

        <div class="section">
            <div class="section-title">
                <span>🍵</span>
                <span>微信打赏</span>
            </div>
            <div class="qr-code">
                <img src="https://jagshen.github.io/Mini-bookmark-sync/images/wechat.webp" alt="微信赞赏码" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="qr-label" style="display:none;">请上传微信赞赏码图片</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section">
            <a class="bmac-btn" id="alipayBtn" onclick="copyAlipay()">
                <img src="https://jagshen.github.io/Mini-bookmark-sync/images/bmc-new-btn-logo.svg" alt="Buy Me a Coffee">
                请我喝咖啡
            </a>
        </div>

        <div class="footer">
            <a href="https://github.com/jagshen/Mini-bookmark-sync">极简书签同步</a> · 让书签同步变得简单 &nbsp;|&nbsp; <a href="https://jagshen.github.io/Mini-bookmark-sync/privacy.html">隐私条款</a>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
    const ALIPAY_TEXT = 'z:/1aiScYt189y 或🔍服制🔎此消息打开💯吱.fu.保💯，优惠不断，天天有微笑  b:/H HU4159 $912';

    async function copyAlipay() {
        const btn = document.getElementById('alipayBtn');
        try {
            await navigator.clipboard.writeText(ALIPAY_TEXT);
            btn.classList.add('copied');
            showToast('✅ 已复制口令，请到支付宝领取');
            setTimeout(() => btn.classList.remove('copied'), 1500);
        } catch (err) {
            // 降级方案：用 textarea 复制
            const textarea = document.createElement('textarea');
            textarea.value = ALIPAY_TEXT;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            btn.classList.add('copied');
            showToast('✅ 已复制口令，请到支付宝领取');
            setTimeout(() => btn.classList.remove('copied'), 1500);
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }
    </script>
</body>
</html>
