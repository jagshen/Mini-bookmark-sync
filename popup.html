<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>极简书签同步</title>
    <style>
        * { box-sizing: border-box; }
        body {
            width: 320px;
            margin: 0;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            color: #222;
            background: #fff;
        }

        /* ===== 主页视图 ===== */
        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px 14px 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            letter-spacing: 2px;
            color: #6b7280;
            font-weight: 700;
        }
        .badge-ok {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #10b981;
            font-size: 12px;
            letter-spacing: 0;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .badge-ok:hover { background: #f3f4f6; }
        .badge-ok.err { color: #ef4444; }
        .badge-ok.warn { color: #f59e0b; }
        .badge-ok.off { color: #9ca3af; }
        .badge-ok.disabled { cursor: not-allowed; opacity: 0.6; }
        .badge-ok.disabled:hover { background: transparent; }
        .domain-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .folder-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }
        .domain-title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }
        .sub-info {
            color: #6b7280;
            font-size: 12px;
            margin-top: 4px;
            word-break: break-all;
        }
        .info-box {
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            color: #2563eb;
            font-size: 12px;
            background: #f8fbff;
        }
        .info-box.never { color: #6b7280; border-color: #e5e7eb; background: #f9fafb; }
        .info-box.warn { color: #b45309; border-color: #fcd34d; background: #fffbeb; }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 8px;
        }
        .btn {
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 6px;
            padding: 7px 10px;
            cursor: pointer;
            font-size: 13px;
            color: #374151;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:hover { background: #f9fafb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .icon-btn {
            width: 36px;
            height: 32px;
            padding: 0;
            justify-content: center;
        }
        .right-group { display: flex; gap: 6px; }

        .status-bar {
            margin-top: 10px;
            font-size: 12px;
            color: #6b7280;
            min-height: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            overflow: visible !important;
        }
        .status-bar.err .status-text { color: #ef4444; }
        .status-bar.ok .status-text { color: #10b981; }
        .status-text {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .auto-sync-tag {
            color: #2563eb;
            font-size: 11px;
            white-space: nowrap;
            font-weight: 500;
        }
        .auto-sync-tag.off { color: #9ca3af; }

        /* 赞赏按钮 */
        .sponsor-wrap {
            position: relative;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }
        .sponsor-icon {
            width: 20px;
            height: 20px;
            opacity: 0.5;
            transition: opacity 0.15s, filter 0.15s;
            vertical-align: middle;
        }
        .sponsor-wrap:hover .sponsor-icon { opacity: 1; filter: drop-shadow(0 1px 2px rgba(245,158,11,0.3)); cursor: pointer; }

        /* 卡片内赞赏码展示区 - 由 JS 控制显示 */
        .sponsor-area {
            display: none;
            text-align: center;
            margin: 10px -14px -12px;
            padding: 0;
            overflow: hidden;
        }
        .sponsor-area.show { display: block; }
        .sponsor-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .sponsor-text {
            margin: 6px 0 0;
            font-size: 11px;
            color: #999;
        }

        /* 底部添加配置按钮 */
        .footer-row {
            margin-top: 12px;
        }
        .add-config-btn {
            width: 100%;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .add-config-btn:hover { background: #1d4ed8; }

        /* 空态：未配置时的标题区 */
        .empty-hero {
            text-align: center;
            padding: 18px 8px 14px;
        }
        .empty-title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            letter-spacing: 1px;
        }
        .empty-sub {
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        /* ===== 配置视图 ===== */
        .hide { display: none !important; }
        .config-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .config-head h3 {
            margin: 0;
            font-size: 16px;
            flex: 1;
        }
        label {
            display: block;
            font-size: 12px;
            color: #374151;
            margin-top: 8px;
            margin-bottom: 3px;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, select:focus { border-color: #2563eb; }
        .security-hint {
            margin-top: 3px;
            padding: 5px 7px;
            background: #fffbeb;
            border: 1px solid #fcd34d;
            border-radius: 4px;
            color: #b45309;
            font-size: 11px;
            line-height: 1.3;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .row input[type="checkbox"] { width: auto; margin: 0; }
        hr { border: none; border-top: 1px solid #eee; margin: 10px 0 2px; }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .btn-row .btn { flex: 1; justify-content: center; }
        .icon-danger {
            border: 1px solid #fecaca;
            background: #fff;
            color: #ef4444;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            padding: 0;
            cursor: pointer;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .icon-danger:hover { background: #fef2f2; }
    </style>
</head>
<body>
    <!-- ===== 主页视图 ===== -->
    <div id="homeView">
        <!-- 未配置态才展示：居中的空态提示 -->
        <div id="emptyHero" class="empty-hero hide">
            <div class="empty-title">极简书签同步</div>
            <div class="empty-sub">简单好用的书签同步工具，体积小巧、干净无广告。</div>
        </div>

        <div id="homeCard" class="card">
            <div class="card-head">
                <span>极简书签同步｜支持Berry</span>
                <span id="connBadge" class="badge-ok" title="点击切换自动同步">● 已启用</span>
            </div>

            <div class="domain-row">
                <img class="folder-icon" src="icons/icon.png" alt="">
                <span id="domainText" class="domain-title">未配置</span>
            </div>
            <div id="subInfo" class="sub-info">点击下方「添加配置」开始使用</div>

            <div id="lastSyncBox" class="info-box never">上次同步：从未</div>

            <div class="action-row">
                <button id="openConfigBtn" class="btn" title="配置">⚙️ 选项</button>
                <div class="right-group">
                    <button id="downloadBtn" class="btn icon-btn" title="从云端下载">⬇</button>
                    <button id="uploadBtn" class="btn icon-btn" title="上传到云端">⬆</button>
                    <button id="syncBtn" class="btn icon-btn btn-primary" title="两端合并同步">⟳</button>
                </div>
            </div>

            <div class="status-bar">
                <div id="sponsorBtn" class="sponsor-wrap" title="">
                    <img class="sponsor-icon" src="images/nb.svg" alt="赞赏">
                </div>
                <span id="status" class="status-text">就绪</span>
                <span id="autoSyncTag" class="auto-sync-tag off">未启用自动同步</span>
            </div>

            <div id="sponsorArea" class="sponsor-area">
                <img src="images/wechat.png" alt="赞赏码" class="sponsor-img">
            </div>
        </div>

        <div id="footerRow" class="footer-row hide">
            <button id="addConfigBtn" class="add-config-btn">+ 添加配置</button>
        </div>
    </div>

    <!-- ===== 配置视图 ===== -->
    <div id="configView" class="hide">
        <div class="config-head">
            <button id="backBtn" class="btn" title="返回">←</button>
            <h3>WebDAV 配置</h3>
            <button id="clearConfigBtn" class="icon-danger" title="清除配置">🗑</button>
        </div>

        <label>WebDAV 地址:</label>
        <input type="text" id="webdav_url" placeholder="https://example.com/dav/">
        <label>用户名:</label>
        <input type="text" id="webdav_user">
        <label>应用密码:</label>
        <input type="password" id="webdav_password">
        <div class="security-hint">⚠️ 密码仅存储在本地浏览器，不会上传至第三方服务器</div>
        <label>云端文件路径:</label>
        <input type="text" id="webdav_path" placeholder="/bookmarks.json">

        <hr>

        <div class="row">
            <input type="checkbox" id="syncEnabled">
            <label for="syncEnabled" style="margin:0;">启用自动同步</label>
        </div>

        <label>同步类型:</label>
        <select id="syncTypeSelect">
            <option value="merge" selected>合并书签（两端合并）</option>
            <option value="upload">上传书签（本地覆盖云端）</option>
            <option value="download">下载书签（云端覆盖本地）</option>
        </select>

        <label>自动同步间隔（分钟）:</label>
        <select id="intervalSelect">
            <option value="15">15 分钟</option>
            <option value="30" selected>30 分钟</option>
            <option value="60">1 小时</option>
            <option value="120">2 小时</option>
        </select>

        <div class="btn-row">
            <button id="testConnectionBtn" class="btn">测试连接</button>
            <button id="saveBtn" class="btn btn-primary">保存</button>
        </div>

        <div id="configStatus" class="status-bar"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
